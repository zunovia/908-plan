name: zero_app
description: Voxna — 声の鏡。毎日30秒の声から、あなたの無意識のパターンを映し出す。
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.0.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0

  # Audio
  record: ^6.0.0
  audioplayers: ^6.0.0

  # Audio Analysis
  wav: ^1.5.0
  fftea: ^1.5.0

  # Storage
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0
  flutter_secure_storage: ^9.2.0

  # Charts
  fl_chart: ^0.68.0

  # Path
  path_provider: ^2.1.0

  # Utilities
  permission_handler: ^11.3.0
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/voxna_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/voxna_logo.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
