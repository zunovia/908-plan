name: Generate Upload Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate upload keystore
        run: |
          keytool -genkey -v \
            -keystore upload-keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass voxna2024 \
            -keypass voxna2024 \
            -dname "CN=Voxna,O=Sur Communication,C=JP"

      - name: Output base64 for GitHub Secret
        run: |
          echo "=== Copy the base64 below into GitHub Secret UPLOAD_KEYSTORE ==="
          base64 -w 0 upload-keystore.jks
          echo ""
          echo "=== End of base64 ==="

      - name: Show SHA1 fingerprint
        run: |
          keytool -list -v -keystore upload-keystore.jks -alias upload -storepass voxna2024 | grep SHA1

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: upload-keystore.jks
          retention-days: 1
