name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Restore debug keystore cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Generate debug keystore if not cached
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Voxna Debug,O=Sur Communication,C=JP"

      - name: Generate Android project
        run: |
          flutter create --project-name zero_app --org com.voxna --platforms android --no-pub .
          git checkout -- pubspec.yaml l10n.yaml

      - name: Configure build.gradle
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = "com.voxna.zero_app"/applicationId = "com.voxna.app"/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
            sed -i 's/minSdk = .*$/minSdk = 23/' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/' android/app/build.gradle.kts
            sed -i 's/targetSdk = .*$/targetSdk = 34/' android/app/build.gradle.kts
            sed -i '/^plugins {/a\    id("com.google.gms.google-services")' android/app/build.gradle.kts
            if [ -f android/settings.gradle.kts ]; then
              sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.4.2" apply false' android/settings.gradle.kts
            fi
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/applicationId = "com.voxna.zero_app"/applicationId = "com.voxna.app"/' android/app/build.gradle
            sed -i "s/applicationId \"com.voxna.zero_app\"/applicationId \"com.voxna.app\"/" android/app/build.gradle
            sed -i "s/minSdk = flutter.minSdkVersion/minSdk = 23/" android/app/build.gradle
            sed -i "s/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/" android/app/build.gradle
            sed -i "s/targetSdk = flutter.targetSdkVersion/targetSdk = 34/" android/app/build.gradle
            sed -i "s/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/" android/app/build.gradle
            echo "" >> android/app/build.gradle
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
            if [ -f android/settings.gradle ]; then
              sed -i '/id "com.android.application"/a\    id "com.google.gms.google-services" version "4.4.2" apply false' android/settings.gradle
            elif [ -f android/build.gradle ]; then
              sed -i '/dependencies {/a\        classpath "com.google.gms:google-services:4.4.2"' android/build.gradle
            fi
          fi

      - name: Add Android permissions for recording
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"

      - name: Set app label to Voxna
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="zero_app"/android:label="Voxna"/' "$MANIFEST"

      - name: Add proguard rules
        run: cp proguard-rules.pro android/app/proguard-rules.pro

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Place google-services.json
        run: cp google-services.json android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: voxna-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Generate upload keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/upload-keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass voxna2024 \
            -keypass voxna2024 \
            -dname "CN=Voxna,O=Sur Communication,C=JP"

      - name: Generate Android project
        run: |
          flutter create --project-name zero_app --org com.voxna --platforms android --no-pub .
          git checkout -- pubspec.yaml l10n.yaml

      - name: Configure build.gradle for release
        run: |
          # Create key.properties
          cat > android/key.properties << 'PROPS'
          storePassword=voxna2024
          keyPassword=voxna2024
          keyAlias=upload
          storeFile=upload-keystore.jks
          PROPS

          if [ -f android/app/build.gradle ]; then
            # Add signing config reference at top of android block
            sed -i '/^android {/a\
            def keystoreProperties = new Properties()\ndef keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) {\n    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n}' android/app/build.gradle

            # Add signingConfigs block before buildTypes
            sed -i '/buildTypes {/i\
            signingConfigs {\n    release {\n        keyAlias keystoreProperties["keyAlias"]\n        keyPassword keystoreProperties["keyPassword"]\n        storeFile file(keystoreProperties["storeFile"])\n        storePassword keystoreProperties["storePassword"]\n    }\n}' android/app/build.gradle

            # Replace debug signing with release signing in release buildType
            sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' android/app/build.gradle

            # applicationId and SDK versions
            sed -i 's/applicationId = "com.voxna.zero_app"/applicationId = "com.voxna.app"/' android/app/build.gradle
            sed -i "s/applicationId \"com.voxna.zero_app\"/applicationId \"com.voxna.app\"/" android/app/build.gradle
            sed -i "s/minSdk = flutter.minSdkVersion/minSdk = 23/" android/app/build.gradle
            sed -i "s/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/" android/app/build.gradle
            sed -i "s/targetSdk = flutter.targetSdkVersion/targetSdk = 34/" android/app/build.gradle
            sed -i "s/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/" android/app/build.gradle

            # Disable R8 minification
            sed -i 's/minifyEnabled true/minifyEnabled false/' android/app/build.gradle
            sed -i 's/shrinkResources true/shrinkResources false/' android/app/build.gradle
            if ! grep -q "minifyEnabled" android/app/build.gradle; then
              sed -i '/signingConfig signingConfigs.release/a\            minifyEnabled false' android/app/build.gradle
            fi

            # Google Services plugin
            echo "" >> android/app/build.gradle
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
            if [ -f android/settings.gradle ]; then
              sed -i '/id "com.android.application"/a\    id "com.google.gms.google-services" version "4.4.2" apply false' android/settings.gradle
            elif [ -f android/build.gradle ]; then
              sed -i '/dependencies {/a\        classpath "com.google.gms:google-services:4.4.2"' android/build.gradle
            fi

          elif [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = "com.voxna.zero_app"/applicationId = "com.voxna.app"/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
            sed -i 's/minSdk = .*$/minSdk = 23/' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/' android/app/build.gradle.kts
            sed -i 's/targetSdk = .*$/targetSdk = 34/' android/app/build.gradle.kts
            sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/' android/app/build.gradle.kts
            sed -i '/^plugins {/a\    id("com.google.gms.google-services")' android/app/build.gradle.kts
            if [ -f android/settings.gradle.kts ]; then
              sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.4.2" apply false' android/settings.gradle.kts
            fi
          fi

      - name: Add Android permissions for recording
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"

      - name: Set app label to Voxna
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="zero_app"/android:label="Voxna"/' "$MANIFEST"

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Place google-services.json
        run: cp google-services.json android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: voxna-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
