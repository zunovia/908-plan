name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Restore debug keystore cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Generate debug keystore if not cached
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Voxna Debug,O=Sur Communication,C=JP"

      - name: Generate Android project
        run: |
          flutter create --project-name zero_app --org com.voxna --platforms android --no-pub .
          git checkout -- pubspec.yaml l10n.yaml

      - name: Configure build.gradle
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = "com.voxna.zero_app"/applicationId = "app.voxna.android"/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
            sed -i 's/minSdk = .*$/minSdk = 23/' android/app/build.gradle.kts
            sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle.kts
            sed -i 's/targetSdk = .*$/targetSdk = 35/' android/app/build.gradle.kts
            sed -i '/^plugins {/a\    id("com.google.gms.google-services")' android/app/build.gradle.kts
            if [ -f android/settings.gradle.kts ]; then
              sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.4.2" apply false' android/settings.gradle.kts
            fi
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/applicationId = "com.voxna.zero_app"/applicationId = "app.voxna.android"/' android/app/build.gradle
            sed -i "s/applicationId \"com.voxna.zero_app\"/applicationId \"app.voxna.android\"/" android/app/build.gradle
            sed -i "s/minSdk = flutter.minSdkVersion/minSdk = 23/" android/app/build.gradle
            sed -i "s/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/" android/app/build.gradle
            sed -i "s/targetSdk = flutter.targetSdkVersion/targetSdk = 35/" android/app/build.gradle
            sed -i "s/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/" android/app/build.gradle
            echo "" >> android/app/build.gradle
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
            if [ -f android/settings.gradle ]; then
              sed -i '/id "com.android.application"/a\    id "com.google.gms.google-services" version "4.4.2" apply false' android/settings.gradle
            elif [ -f android/build.gradle ]; then
              sed -i '/dependencies {/a\        classpath "com.google.gms:google-services:4.4.2"' android/build.gradle
            fi
          fi

      - name: Add Android permissions for recording
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"

      - name: Set app label to Voxna
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="zero_app"/android:label="Voxna"/' "$MANIFEST"

      - name: Add proguard rules
        run: cp proguard-rules.pro android/app/proguard-rules.pro

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Place google-services.json
        run: cp google-services.json android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: voxna-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project
        run: |
          flutter create --project-name zero_app --org com.voxna --platforms android --no-pub .
          git checkout -- pubspec.yaml l10n.yaml

      - name: Decode upload keystore from secret
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE }}" | base64 -d > android/app/upload-keystore.jks

      - name: Configure build.gradle for release
        run: |
          # Write key.properties
          printf 'storePassword=voxna2024\nkeyPassword=voxna2024\nkeyAlias=upload\nstoreFile=upload-keystore.jks\n' > android/key.properties
          # Replace generated Groovy DSL files with repo templates
          cp android-templates/app-build.gradle android/app/build.gradle
          cp android-templates/settings.gradle android/settings.gradle

      - name: Add Android permissions for recording
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"

      - name: Set app label to Voxna
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="zero_app"/android:label="Voxna"/' "$MANIFEST"

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Place google-services.json
        run: cp google-services.json android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: voxna-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
